name: Agent Pipeline

on:
  issues:
    types: [labeled]
  pull_request:
    types: [opened, synchronize, labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  # ---- Planning: opus, $2 budget ----
  plan:
    if: >
      github.event_name == 'issues' &&
      github.event.label.name == 'ready'
    runs-on: self-hosted
    steps:
      - name: Checkout project repo
        uses: actions/checkout@v4

      - name: Checkout agent-platform (for agent definitions + rules)
        uses: actions/checkout@v4
        with:
          repository: mbrajk/agent-platform
          path: .agent-platform

      - name: Run planner
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          label_trigger: "ready"
          prompt: |
            REPO: ${{ github.repository }}
            ISSUE NUMBER: ${{ github.event.issue.number }}
            TITLE: ${{ github.event.issue.title }}
            BODY: ${{ github.event.issue.body }}

            You are the planner agent. Read the issue above, explore the codebase,
            and post an implementation plan as a comment on the issue.
            Follow the plan format defined in your agent instructions, including
            acceptance criteria in WHEN-THEN-SHALL format.

            After posting the plan:
            - Add label "planned" to the issue
            - Add a complexity label (complexity:small, complexity:medium, or complexity:large)
            - Remove the "ready" label
          claude_args: |
            --model opus
            --max-budget-usd 2
            --append-system-prompt-file .agent-platform/agents/planner.md
            --append-system-prompt-file .agent-platform/rules/code-structure.md

  # ---- Implementation: sonnet, $5 budget ----
  implement:
    if: >
      github.event_name == 'issues' &&
      github.event.label.name == 'approved'
    runs-on: self-hosted
    steps:
      - name: Checkout project repo
        uses: actions/checkout@v4

      - name: Checkout agent-platform (for agent definitions + rules)
        uses: actions/checkout@v4
        with:
          repository: mbrajk/agent-platform
          path: .agent-platform

      - name: Run implementer
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          label_trigger: "approved"
          prompt: |
            REPO: ${{ github.repository }}
            ISSUE NUMBER: ${{ github.event.issue.number }}
            TITLE: ${{ github.event.issue.title }}
            BODY: ${{ github.event.issue.body }}

            You are the implementer agent. Read the approved implementation plan
            from the issue comments, then implement it.

            Follow your agent instructions: write tests first from the acceptance
            criteria, then implement, then verify the build passes.

            Commit your changes, push the branch, and create a draft PR with
            the label "agent-pr". Link the PR to this issue with "Closes #${{ github.event.issue.number }}".

            After creating the PR:
            - Add label "in-progress" to the issue
            - Remove the "approved" label
          claude_args: |
            --model sonnet
            --max-budget-usd 5
            --append-system-prompt-file .agent-platform/agents/implementer.md
            --append-system-prompt-file .agent-platform/rules/code-structure.md

  # ---- Review gates: triggered by "agent-pr" label on PRs ----

  review-code:
    if: >
      github.event_name == 'pull_request' &&
      contains(github.event.pull_request.labels.*.name, 'agent-pr')
    runs-on: self-hosted
    steps:
      - name: Checkout agent-platform (for rules)
        uses: actions/checkout@v4
        with:
          repository: mbrajk/agent-platform
          path: .agent-platform

      - name: Code structure review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this PR for code structure and maintainability.
            Apply the standards from your agent instructions.
            Post inline comments on specific lines where issues are found.
            Approve if all checks pass, request changes if blocking issues exist.
          claude_args: |
            --model sonnet
            --max-budget-usd 1
            --append-system-prompt-file .agent-platform/agents/code-reviewer.md
            --append-system-prompt-file .agent-platform/rules/code-structure.md

  review-security:
    if: >
      github.event_name == 'pull_request' &&
      contains(github.event.pull_request.labels.*.name, 'agent-pr')
    runs-on: self-hosted
    steps:
      - name: Checkout agent-platform (for rules)
        uses: actions/checkout@v4
        with:
          repository: mbrajk/agent-platform
          path: .agent-platform

      - name: Security review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this PR for security vulnerabilities.
            Apply the standards from your agent instructions.
            Post inline comments on specific lines where issues are found.
            Focus on real, exploitable vulnerabilities — not theoretical risks.
            Approve if no blocking issues, request changes for critical/high findings.
          claude_args: |
            --model sonnet
            --max-budget-usd 1
            --append-system-prompt-file .agent-platform/agents/security-analyst.md
            --append-system-prompt-file .agent-platform/rules/security-standards.md

  review-ux:
    if: >
      github.event_name == 'pull_request' &&
      contains(github.event.pull_request.labels.*.name, 'agent-pr')
    runs-on: self-hosted
    steps:
      - name: Checkout agent-platform (for rules)
        uses: actions/checkout@v4
        with:
          repository: mbrajk/agent-platform
          path: .agent-platform

      - name: UX review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this PR for UX, accessibility, and responsive design issues.
            Apply the standards from your agent instructions.
            If no frontend files (tsx, jsx, css, html, vue, svelte) were changed,
            simply approve with "No UI changes — UX review not applicable."
            Otherwise, post inline comments on specific lines where issues are found.
          claude_args: |
            --model sonnet
            --max-budget-usd 1
            --append-system-prompt-file .agent-platform/agents/ux-reviewer.md
            --append-system-prompt-file .agent-platform/rules/ux-standards.md

  build-test:
    if: >
      github.event_name == 'pull_request' &&
      contains(github.event.pull_request.labels.*.name, 'agent-pr')
    runs-on: self-hosted
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Checkout agent-platform (for rules)
        uses: actions/checkout@v4
        with:
          repository: mbrajk/agent-platform
          path: .agent-platform

      - name: Build and test
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Run the build and test verification for this project.
            Read .agents/config.yml for the project's build, lint, typecheck, and test commands.
            Execute each configured command and report results.
            Do not modify any files — only run commands and report.
            Approve if all checks pass, request changes if the build or tests fail.
          claude_args: |
            --model haiku
            --max-budget-usd 0.50
            --append-system-prompt-file .agent-platform/agents/build-test.md
