# Reusable workflow: Implement an approved plan
# Triggered when an issue is labeled "approved"

name: Implement Issue

on:
  workflow_call:
    inputs:
      issue_number:
        required: true
        type: number
    secrets:
      ANTHROPIC_API_KEY:
        required: true

jobs:
  implement:
    runs-on: self-hosted
    steps:
      - name: Checkout project repo
        uses: actions/checkout@v4

      - name: Checkout agent-platform
        uses: actions/checkout@v4
        with:
          repository: mbrajk/agent-platform
          path: .agent-platform
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run implementer agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          .agent-platform/run-agent.sh implement \
            --repo "${{ github.workspace }}" \
            --issue ${{ inputs.issue_number }}
